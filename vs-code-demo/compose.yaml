services:
  vs-code:
    image: explorviz/vs-code:dev
    ports:
      - 3001:80
    links:
      # necessary for mixed content (= iframe of frontend) that is not served via HTTPS
      - "frontend:localhost"
    environment:
      - VS_CODE_BACKEND_URL=http://${VSCODE_HOSTNAME}:${VSCODE_PORT}
      - FRONTEND_URL=http://${FRONTEND_HOSTNAME}:${FRONTEND_PORT}
    volumes:
      - ./projects:/home/workspace/projects
    command: --port 80

  demo-supplier:
    container_name: explorviz-demo-supplier
    image: explorviz/demo-supplier:latest
    ports:
      - ${USER_PORT}:8084
      - ${PERSISTENCE_PORT}:8085

  vs-code-backend:
    container_name: vs-code-backend
    image: explorviz/vs-code-backend:dev
    environment:
      - EXPERIMENT_MODE=true
    ports:
      - ${VSCODE_PORT}:3000

  frontend:
    image: explorviz/frontend:latest
    ports:
      - ${FRONTEND_PORT}:80
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - FRONTEND_HOST_URL=http://${FRONTEND_HOSTNAME}:${FRONTEND_PORT} # Determines base URL for backend services that frontend calls
      - FRONTEND_HOSTNAME=${FRONTEND_HOSTNAME}
      - CODE_AGENT_URL=http://${DEMO_HOSTNAME}:${DEMO_PORT}
      - PERSISTENCE_SERV_URL=http://${PERSISTENCE_HOSTNAME}:${PERSISTENCE_PORT}
      - COPILOT_SERV_URL=http://${DEMO_HOSTNAME}:${DEMO_PORT}
      - USER_SERV_URL=http://${USER_HOSTNAME}:${USER_PORT}
      - VSCODE_SERV_URL=http://${VSCODE_HOSTNAME}:${VSCODE_PORT}
      - KEYCLOAK_URL=http://${DEMO_HOSTNAME}:${DEMO_PORT}

networks:
  default:
    name: explorviz
