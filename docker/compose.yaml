# ExplorViz Backend

# Start: `docker compose up -d`
# Stop + remove volumes: `docker compose down -v`

# To use native images instead of jvm-based images either modify .env file
# or start with `EXPLORVIZ_JAVA_IMAGE_TYPE=native docker compose up -d`

# Using custom .env file, e.g., `docker compose --env-file .env-custom up -d`

include:
  - ./compose/compose.base.yaml

services:
  trace-service:
    image: explorviz/trace-service:${TRACE_SERVICE_IMAGE_TAG}
    hostname: ${TRACE_HOSTNAME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["backend"]
    env_file:
      - path: ./.env
      - path: ./.env-custom
        required: false
    depends_on:
      init-kafka:
        condition: service_completed_successfully
    ports:
      - ${TRACE_PORT}:${TRACE_PORT_INTERNAL}
    environment:
      - EXPLORVIZ_BROKER=${KAFKA_HOSTNAME}:${KAFKA_INT_PORT}
      - EXPLORVIZ_VALIDATE_TOKENS=true
    deploy:
      mode: replicated
      replicas: ${TRACE_REPLICAS}

  user-service:
    hostname: ${USER_HOSTNAME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    image: explorviz/user-service-${EXPLORVIZ_JAVA_IMAGE_TYPE}:${USER_SERVICE_IMAGE_TAG}
    profiles: ["backend"]
    env_file:
      - path: ./.env
      - path: ./.env-custom
        required: false
    depends_on:
      init-kafka:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
      mongo-user:
        condition: service_started
    ports:
      - ${USER_PORT}:${USER_PORT_INTERNAL}
    environment:
      - QUARKUS_OIDC_ENABLED=${KEYCLOAK_AUTH_ENABLED}
      - INIT_TOKEN_ENABLED=true
      - INIT_TOKEN_VALUE=mytokenvalue
      - INIT_TOKEN_SECRET=mytokensecret
      - QUARKUS_MONGODB_CONNECTION_STRING=mongodb://${LOCALHOST_ALIAS}:${MONGO_USER_SERV_PORT}
      - EXPLORVIZ_LOG_LVL=DEBUG
      - QUARKUS_OIDC_AUTH_SERVER_URL=http://${KEYCLOAK_HOSTNAME}:${KEYCLOAK_PORT_INTERNAL}/realms/${KEYCLOAK_REALM}
      - QUARKUS_OIDC_TOKEN_ISSUER=http://localhost:${KEYCLOAK_PORT}/realms/${KEYCLOAK_REALM}
      - QUARKUS_OIDC_JWKS_PATH=/protocol/openid-connect/certs
      - QUARKUS_OIDC_CLIENT_ID=${USER_SERVICE_KC_CLIENT}

  landscape-service:
    hostname: ${LANDSCAPE_HOSTNAME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["backend"]
    image: explorviz/landscape-service:${LANDSCAPE_SERVICE_IMAGE_TAG}
    env_file:
      - path: ./.env
      - path: ./.env-custom
        required: false
    depends_on:
      init-kafka:
        condition: service_completed_successfully
      neo4j:
        condition: service_healthy
    ports:
      - ${LANDSCAPE_PORT}:${LANDSCAPE_PORT_INTERNAL}
      - ${LANDSCAPE_GRPC_PORT}:9000

  code-analyzer:
    hostname: ${CODE_ANALYZER_HOSTNAME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["backend"]
    image: explorviz/code-analyzer:${CODE_ANALYZER_IMAGE_TAG}
    env_file:
      - path: ./.env
      - path: ./.env-custom
        required: false
    ports:
      - ${CODE_ANALYZER_PORT}:${CODE_ANALYZER_PORT_INTERNAL}
    environment:
      - EXPLORVIZ_LOG_LVL=DEBUG

  chatbot-service:
    hostname: ${COPILOT_HOSTNAME}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles: ["chatbot"]
    image: explorviz/ai-chat-service:${COPILOT_IMAGE_TAG}
    env_file: ./.llm-api-keys.env
    ports:
      - ${COPILOT_PORT}:${COPILOT_PORT_INTERNAL}
