# Contains non-Java ExplorViz components

# Start with top-level compose.yaml.

include:
  - ./compose.extra.yaml

services:
  frontend:
    hostname: frontend
    image: explorviz/frontend:${FRONTEND_IMAGE_TAG}
    profiles: ["frontend"]
    env_file:
      - path: ../.env
      - path: ../.env-custom
        required: false
    ports:
      - ${FRONTEND_PORT}:80
    environment:
      - FRONTEND_HOST_URL=http://${FRONTEND_HOSTNAME}:${FRONTEND_PORT} # Determines base URL for backend services that frontend calls
      - FRONTEND_HOSTNAME=${FRONTEND_HOSTNAME}
      - CODE_ANALYZER_URL=http://${CODE_ANALYZER_HOSTNAME}:${CODE_ANALYZER_PORT_INTERNAL}
      - LANDSCAPE_SERV_URL=http://${LANDSCAPE_HOSTNAME}:${LANDSCAPE_PORT}
      - COPILOT_SERV_URL=http://${COPILOT_HOSTNAME}:${COPILOT_PORT_INTERNAL}
      - USER_SERV_URL=http://${USER_HOSTNAME}:${USER_PORT_INTERNAL}
      - VSCODE_SERV_URL=http://${VSCODE_HOSTNAME}:${VSCODE_INT_PORT}
      - KEYCLOAK_URL=http://${KEYCLOAK_HOSTNAME}:${KEYCLOAK_PORT}
