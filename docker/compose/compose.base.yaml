# Contains non-Java ExplorViz components

# Start with top-level compose.yaml.

include:
  - ./compose.extra.yaml

services:
  collaboration-service:
    hostname: collaboration-service
    image: explorviz/collaboration-service:${COLLABORATION_SERVICE_IMAGE_TAG}
    profiles: ["backend"]
    env_file:
      - path: ../.env
      - path: ../.env-custom
        required: false
    ports:
      - ${COLLABORATION_PORT}:4444
    environment:
      - REDIS_HOST=redis-collab
      - REDIS_PORT=6379

  frontend:
    hostname: frontend
    image: explorviz/frontend:${FRONTEND_IMAGE_TAG}
    profiles: ["frontend"]
    env_file:
      - path: ../.env
      - path: ../.env-custom
        required: false
    depends_on:
      - span-service
      - user-service
      - collaboration-service
    ports:
      - ${FRONTEND_PORT}:80
    environment:
      - FRONTEND_HOST_URL=http://${FRONTEND_HOST_NAME}:${FRONTEND_PORT} # Determines base URL for backend services that frontend calls
      - FRONTEND_HOST_NAME=${FRONTEND_HOST_NAME}
      - CODE_AGENT_URL=http://${CODE_AGENT_HOSTNAME}:${CODE_AGENT_PORT_INTERNAL}
      - CODE_SERV_URL=http://${CODE_HOSTNAME}:${CODE_PORT}
      - LANDSCAPE_URL=http://${SPAN_HOSTNAME}:${SPAN_PORT_INTERNAL}
      - TRACE_URL=http://${SPAN_HOSTNAME}:${SPAN_PORT_INTERNAL}
      - TIMESTAMPS_URL=http://${SPAN_HOSTNAME}:${SPAN_PORT_INTERNAL}
      - USER_URL=http://${USER_HOSTNAME}:${USER_PORT_INTERNAL}
      - COLLABORATION_URL=http://${COLLABORATION_HOSTNAME}:${COLLABORATION_PORT}
      - VSCODE_SERV_URL=http://${FRONTEND_HOST_NAME}:${FRONTEND_PORT}
      - AUTH0_LOGO_URL=${AUTH0_LOGO_URL}
      - AUTH0_CALLBACK_URL=${AUTH0_CALLBACK_URL}
      - AUTH0_LOGOUT_URL=${AUTH0_LOGOUT_URL}
      - NO_AUTH_USER_NICKNAME=${NO_AUTH_USER_NICKNAME}

  keycloak:
    image: quay.io/keycloak/keycloak:26.4.7
    container_name: keycloak
    profiles:
      - backend
    command: 
      - start-dev
      - --import-realm
    volumes:
      - ${KEYCLOAK_REALM_CONFIG}:/opt/keycloak/data/import/explorviz-realm.json
    ports:
      - "${KEYCLOAK_PORT}:8080"
    env_file:
      - ../.env
    environment:
      #db config
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PWD}

      # admin config
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASS}

      # network config
      KC_HTTP_HOST: "0.0.0.0" 
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: ${KEYCLOAK_PORT}
      KC_HOSTNAME_SCHEME: http
      
      # Security relaxations for local dev
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
    networks:
      - default
