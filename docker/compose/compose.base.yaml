# Contains non-Java ExplorViz components

# Start with top-level compose.yaml.

include:
  - ./compose.extra.yaml

services:
  collaboration-service:
    hostname: collaboration-service
    image: explorviz/collaboration-service:${COLLABORATION_SERVICE_IMAGE_TAG}
    profiles: ["backend"]
    env_file:
      - path: ../.env
      - path: ../.env-custom
        required: false
    ports:
      - ${COLLABORATION_PORT}:4444
    environment:
      - REDIS_HOST=redis-collab
      - REDIS_PORT=6379

  frontend:
    hostname: frontend
    image: explorviz/frontend:${FRONTEND_IMAGE_TAG}
    profiles: ["frontend"]
    env_file:
      - path: ../.env
      - path: ../.env-custom
        required: false
    ports:
      - ${FRONTEND_PORT}:80
    environment:
      - FRONTEND_HOST_URL=http://${FRONTEND_HOST_NAME}:${FRONTEND_PORT} # Determines base URL for backend services that frontend calls
      - FRONTEND_HOST_NAME=${FRONTEND_HOST_NAME}
      - CODE_AGENT_URL=http://${CODE_AGENT_HOSTNAME}:${CODE_AGENT_PORT_INTERNAL}
      - CODE_SERV_URL=http://${CODE_HOSTNAME}:${CODE_PORT}
      - COPILOT_SERV_URL=http://${COPILOT_HOSTNAME}:${COPILOT_PORT_INTERNAL}
      - SPAN_SERV_URL=http://${SPAN_HOSTNAME}:${SPAN_PORT_INTERNAL}
      - USER_SERV_URL=http://${USER_HOSTNAME}:${USER_PORT_INTERNAL}
      - COLLAB_SERV_URL=http://${COLLABORATION_HOSTNAME}:${COLLABORATION_PORT}
      - VSCODE_SERV_URL=http://${FRONTEND_HOST_NAME}:${FRONTEND_PORT}
      - KEYCLOAK_URL=http://${KEYCLOAK_HOSTNAME}:${KEYCLOAK_PORT}
