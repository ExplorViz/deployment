receivers:
  otlp:
    protocols:
      grpc:
        endpoint: :55678
  otlpjsonfile:
    include:
      - "/etc/otel/*.json"

processors:
  attributes/add_default_landscape_token:
    actions:
      - key: explorviz.token.id
        value: "mytokenvalue"
        action: insert
      - key: explorviz.token.secret
        value: "mytokensecret"
        action: insert

exporters:
  kafka:
    protocol_version: 2.0.0
    brokers:
      - kafka:9092
    topic: telemetry.spans.raw
  debug:
    verbosity: detailed

extensions:
  zpages:
    endpoint: :55679

service:
  extensions:
    - zpages
  pipelines:
    traces:
      receivers:
        - otlp
        - otlpjsonfile
      processors:
        - attributes/add_default_landscape_token
      exporters:
        - debug
        - kafka
