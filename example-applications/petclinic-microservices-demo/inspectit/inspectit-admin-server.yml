inspectit:
  service-name: petclinic-admin-server

  tags:
    extra:
      explorviz.token.id: ${LANDSCAPE_TOKEN_ID}
      explorviz.token.secret: ${LANDSCAPE_TOKEN_SECRET}

      # The following attributes are for compatibility with older ExplorViz versions.
      # If you are working with a recent version of ExplorViz, they can be left out.
      service.name: "petclinic-admin-server"
      service.instance.id: "0"
      telemetry.sdk.language: "java"
      landscape_token: ${LANDSCAPE_TOKEN_ID}
      token_secret: ${LANDSCAPE_TOKEN_SECRET}
      application_name: "petclinic-admin-server"
      application_instance_id: 0
      application_language: "java"

  tracing:
    add-common-tags: ALWAYS

  metrics:
    enabled: false

  instrumentation:
    scopes:
      s_allClasses:
        type:
          name: org.springframework.samples
          matcher-mode: STARTS_WITH_IGNORE_CASE

    rules:
      r_all_methods_no_input_return:
        scopes:
          s_allClasses: true
        tracing:
          start-span: true
          attributes:
            code.function.name: method_fqn_attr

            # The following attributes are for compatibility with older ExplorViz versions.
            # If you are working with a recent version of ExplorViz, they can be left out.
            code.function: method_name # Deprecated OTel semconv attribute
            code.namespace: class_fqn # Deprecated OTel semconv attribute
            java.fqn: method_fqn
        entry:
          method_fqn:
            action: a_get_method_fqn
          method_name:
            action: a_get_method_name
          class_fqn:
            action: a_get_class_fqn

    actions:
      a_get_method_fqn:
        input:
          _methodName: String
          _class: Class
        value: "new StringBuilder(_class.getName()).append('.').append(_methodName).toString()"
      a_get_method_name:
        input:
          _methodName: String
        value: "_methodName"
      a_get_class_fqn:
        input:
          _class: Class
        value: "_class.getName()"

  logging:
    debug: true
    trace: false

  exporters:
    tracing:
      otlp:
        enabled: ENABLED
        endpoint: "http://otel-collector:55678"
        protocol: grpc
