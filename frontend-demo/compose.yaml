services:
  frontend:
    container_name: frontend
    image: explorviz/frontend:latest
    ports:
      - "${FRONTEND_PORT}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - FRONTEND_HOST_URL=http://${FRONTEND_HOSTNAME}:${FRONTEND_PORT} # Determines base URL for backend services that frontend calls
      - FRONTEND_HOSTNAME=${FRONTEND_HOSTNAME}
      - CODE_AGENT_URL=http://${MOCK_HOSTNAME}:${MOCK_PORT}
      - PERSISTENCE_SERV_URL=http://${PERSISTENCE_HOSTNAME}:${PERSISTENCE_PORT}
      - COPILOT_SERV_URL=http://${MOCK_HOSTNAME}:${MOCK_PORT}
      - USER_SERV_URL=http://${USER_HOSTNAME}:${USER_PORT}
      - VSCODE_SERV_URL=http://${MOCK_HOSTNAME}:${MOCK_PORT}
      - KEYCLOAK_URL=http://${MOCK_HOSTNAME}:${MOCK_PORT}

  backend-mock:
    container_name: explorviz-backend-mock
    image: explorviz/backend-mock:latest
    hostname: ${MOCK_HOSTNAME}
    ports:
      - "${USER_PORT}:8084"
      - "${PERSISTENCE_PORT}:8085"

networks:
  default:
    name: explorviz
